name: Deploy Open WebUI

on:
  push:
    branches: [main]
    paths:
      - "open-webui.yaml"
      - ".github/workflows/deploy.yaml"

env:
  STACK_NAME: openwebui
  SERVICE_NAME: openwebui_main   
  SECRETS_PREFIX: open_webui  

jobs:
  deploy:
    runs-on: coral
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versioned secret name
        id: ver
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "name=${SECRETS_PREFIX}_${SHA}" >> "$GITHUB_OUTPUT"

      # ── Create the Docker secret ──
      - name: Create Docker secret
        env:
          OPENAI_API_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          cat <<EOF > /tmp/secrets.env
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
          OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/secrets.env

          docker secret create \
            "${{ steps.ver.outputs.name }}" \
            /tmp/secrets.env 2>/dev/null || true

          shred -u /tmp/secrets.env

      # ── Deploy ──
      # Uses "docker stack deploy" which handles both:
      #   - First deploy (service doesn't exist yet)
      #   - Updates (service already running)
      # The sed replaces the placeholder secret name in the yaml
      # with the versioned one we just created.
      - name: Deploy stack
        run: |
          sed -i "s/open_webui/${{ steps.ver.outputs.name }}/g" \
            open-webui.yaml

          docker stack deploy \
            -c open-webui.yaml \
            "$STACK_NAME"
      # ── Wait ──
      - name: Wait for convergence
        run: |
          for i in $(seq 1 30); do
            REPLICAS=$(docker service ls \
              --filter "name=${SERVICE_NAME}" \
              --format "{{.Replicas}}")
            [ "$REPLICAS" = "1/1" ] && echo "✅ Done" && exit 0
            echo "Waiting... ($i/30) — $REPLICAS"
            sleep 5
          done
          docker service rollback "$SERVICE_NAME"
          exit 1

      # ── Prune ──
      - name: Prune old secrets
        if: always()
        run: |
          docker secret ls \
            --filter "name=${SECRETS_PREFIX}_" \
            --format "{{.ID}} {{.CreatedAt}}" \
          | sort -k2 -r \
          | tail -n +3 \
          | awk '{print $1}' \
          | while read -r id; do
              docker secret rm "$id" 2>/dev/null || true
            done

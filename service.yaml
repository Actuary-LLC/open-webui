version: "3.8"

secrets:
  open_webui:
    external: true

networks:
  reverse-proxy:
    external: true

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.6
    networks:
      - reverse-proxy
    ports:
      - "3001:8080"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.openwebui.rule=Host(`openwebui.actuary.dev`)"
        - "traefik.http.routers.openwebui.entrypoints=websecure"
        - "traefik.http.routers.openwebui.service=openwebui"
        - "traefik.http.routers.openwebui.tls.certresolver=myresolver"
        - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
        delay: 10s
    secrets:
      - open_webui
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000
      - OAUTH_PROVIDER_NAME=authentik
      - OPENID_PROVIDER_URL=https://authentik.actuary.dev/application/o/openweb-ui/.well-known/openid-configuration
      - OPENID_REDIRECT_URI=https://openwebui.actuary.dev/oauth/oidc/callback
      - WEBUI_URL=https://openwebui.actuary.dev
      - ENABLE_OAUTH_SIGNUP=true
      - ENABLE_LOGIN_FORM=false
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while IFS= read -r line; do
          case "$line" in
            \#*|"") continue ;;
          esac
          export "$line"
        done < /run/secrets/open_webui
        exec /app/backend/start.sh
    volumes:
      - /mnt/user/docker/volumes/open-webui:/app/backend/data
